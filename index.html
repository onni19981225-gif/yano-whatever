<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨便，都可以 | Whatever</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* 強制顏色變數定義 */
        :root { --primary: #00ff41; --accent: #ff003c; }
        
        /* 當 body 為不同模式時，強制改變變數值 */
        body.mode-worker { --primary: #00ff41; --accent: #ff003c; }
        body.mode-student { --primary: #00d4ff; --accent: #ffee00; }

        body { 
            font-family: 'Noto Sans TC', 'Orbitron', sans-serif; 
            background-color: #050505; 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
            transition: background-color 0.3s ease; 
        }
        
        /* 這裡使用 var(--primary) 確保會跟著變數跳動 */
        .neon-border { border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary); transition: all 0.3s ease; }
        .neon-text { text-shadow: 0 0 10px var(--primary); color: var(--primary); transition: all 0.3s ease; }
        
        .slot-window { height: 100px; overflow: hidden; position: relative; background: rgba(0,0,0,0.9); }
        .slot-reel { display: flex; flex-direction: column; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); }
        .slot-item { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; text-align: center; width: 100%; padding: 0 20px; }
        
        .cyber-btn { background-color: var(--primary); color: #000; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: all 0.3s ease; cursor: pointer; border: none; }
        .action-btn { background-color: transparent; border: 3px solid var(--primary); box-shadow: 0 0 10px var(--primary); color: white; font-weight: 900; transition: all 0.3s ease; }
        .action-btn:hover { background-color: var(--primary); color: #000; }
        .cyber-btn:disabled { background-color: #333; color: #666; cursor: not-allowed; box-shadow: none; border: 3px solid #444; }
    </style>
</head>
<body class="mode-worker flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-sm flex justify-between items-end mb-8">
        <div class="text-left">
            <div id="mode-text" class="neon-text font-bold text-sm tracking-tighter uppercase">社畜模式</div>
            <div id="count-display" class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest text-left">Scanning nearby...</div>
        </div>
        <button onclick="toggleMode()" class="text-[10px] border-2 border-gray-600 px-3 py-1 hover:bg-white hover:text-black transition-all font-bold">身分切換</button>
    </div>

    <main class="w-full max-w-sm text-center">
        <h1 class="text-5xl font-black italic mb-1 neon-text">隨便，都可以</h1>
        <p class="text-gray-600 text-[10px] mb-8 tracking-[0.4em] uppercase">Lunch Fate Algorithm</p>

        <div class="neon-border relative p-1 bg-black">
            <div class="slot-window border-y border-gray-800">
                <div id="reel" class="slot-reel">
                    <div id="reel-status" class="slot-item text-[16px] text-yellow-500 px-10">開定位，不然我不知道你要吃哪邊的土...</div>
                </div>
            </div>
        </div>

        <button id="spin-btn" onclick="startSpin()" disabled class="cyber-btn w-full py-6 mt-10 text-xl tracking-widest uppercase shadow-lg">
            Wait for GPS...
        </button>

        <div id="result-actions" class="mt-8 flex gap-3 hidden">
            <a id="maps-url" href="#" target="_blank" class="action-btn flex-1 py-3 text-xs tracking-widest text-center">📍 導航店家</a>
            <button onclick="copyToClipboard()" class="action-btn flex-1 py-3 text-xs tracking-widest uppercase">分享給夥伴</button>
        </div>

        <p id="system-comment" class="mt-8 text-sm text-gray-400 italic min-h-[4em] px-4 leading-relaxed font-bold"></p>
    </main>

    <footer class="mt-auto text-[10px] text-gray-700 tracking-widest pb-4 uppercase text-center">
        © TUEZ SYSTEMS // LUNCH_BEYOND_CHOICE
    </footer>

    <script>
        const reasonPool = ["這家我還好", "昨天吃過了", "沒錢", "沒原因", "爽啦！就再抽", "跟老闆有過節", "太膩", "太油", "太健康", "太貴"];
        const fakeOptions = ["黃土高原的土", "西北風", "山珍海味 (你吃得起?)", "昨天剩飯", "問就是麥當勞", "這麼胖還吃", "賴清德"];

        const insults = {
            worker: [
                "走這距離？你是打算順便走到離職嗎？", "吃這麼貴？昨晚的加班費讓你產生了財富自由的幻覺。", 
                "這餐的熱量夠你撐到下班，放心吃吧。", "點這家？你是想透過食物中毒來騙幾天病假對吧？", 
                "吃完這頓，下午開會你只能當個會呼吸的薪水小偷。", "老闆覺得你還有力氣挑食，工作量太少了。",
                "這澱粉量，下午開會絕對會睡死在主管面前。", "吃完記得擦嘴，別主管發現你還吃得起豪華垃圾。"
            ],
            student: [
                "兩百塊？這價位是你這學期學貸的利息嗎？", "吃完這頓，你下週的能量來源就剩下光合作用了。", 
                "走這麼遠？下午點名的課，你是不打算要學分了？", "點這個？看來你對「窮」這個字還有很大誤解。", 
                "吃完這頓，你的存款餘額會比期末成績還難看。", "這家店的評分跟你的出席率一樣，都在及格邊緣。"
            ]
        };

        let currentMode = localStorage.getItem('userMode') || 'worker';
        let nearbyRestaurants = [];
        let isSpinning = false;
        let lastResult = { name: "", url: "" };

        window.onload = () => {
            updateUI();
            const statusLabel = document.getElementById('count-display');
            const reelStatus = document.getElementById('reel-status');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchNearby(pos),
                    (err) => { 
                        statusLabel.innerText = "定位授權失敗";
                        statusLabel.classList.add('text-red-500');
                        reelStatus.innerText = "開定位，不然我不知道你要吃哪邊的土...";
                        reelStatus.classList.add('text-red-500');
                        document.getElementById('spin-btn').innerText = "定位已關閉";
                    },
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            }
        };

        async function fetchNearby(position) {
            const { latitude, longitude } = position.coords;
            const statusLabel = document.getElementById('count-display');
            const btn = document.getElementById('spin-btn');
            const reelStatus = document.getElementById('reel-status');
            
            try {
                const query = `[out:json];node["amenity"~"restaurant|fast_food|cafe"](around:1000,${latitude},${longitude});out;`;
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await response.json();
                nearbyRestaurants = data.elements.map(e => ({ name: e.tags.name, lat: e.lat, lon: e.lon })).filter(r => r.name);

                if(nearbyRestaurants.length === 0) {
                    statusLabel.innerText = "附近沒有任何餐廳";
                    reelStatus.innerText = "這附近連土都沒得吃";
                    btn.innerText = "荒山野嶺沒店";
                    return;
                }
                statusLabel.innerText = `發現附近有 ${nearbyRestaurants.length} 間餐廳`;
                reelStatus.innerText = "SYSTEM_READY";
                btn.disabled = false;
                btn.innerText = "尋找覓食處";
            } catch (error) { 
                statusLabel.innerText = "數據連線斷開";
                reelStatus.innerText = "連線失敗，請檢查網路";
            }
        }

        function startSpin() {
            if (isSpinning || nearbyRestaurants.length === 0) return;
            isSpinning = true;

            const btn = document.getElementById('spin-btn');
            const reel = document.getElementById('reel');
            const comment = document.getElementById('system-comment');
            const actions = document.getElementById('result-actions');

            btn.disabled = true;
            btn.innerText = "正在決定...";
            actions.classList.add('hidden');
            comment.innerText = "正在決定...";

            let shuffledOptions = [...fakeOptions].sort(() => Math.random() - 0.5); 

            let reelHTML = "";
            const spinCount = 21; 
            for(let i=0; i < spinCount; i++) {
                const fakeText = shuffledOptions[i % shuffledOptions.length];
                reelHTML += `<div class="slot-item opacity-50 text-xl text-gray-400 font-bold">${fakeText}</div>`;
            }

            const final = nearbyRestaurants[Math.floor(Math.random() * nearbyRestaurants.length)];
            reelHTML += `<div class="slot-item text-yellow-400 font-black text-2xl">${final.name}</div>`;
            
            reel.innerHTML = reelHTML;
            reel.style.transition = "none";
            reel.style.transform = "translateY(0)";
            reel.offsetHeight; 

            reel.style.transition = "transform 3s cubic-bezier(0.15, 0, 0.15, 1)";
            reel.style.transform = `translateY(-${spinCount * 100}px)`;

            const pool = insults[currentMode];
            const insult = pool[Math.floor(Math.random() * pool.length)];

            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false;
                btn.innerText = reasonPool[Math.floor(Math.random() * reasonPool.length)];
                comment.innerText = insult;
                
                // 修正手機版導航連結，確保喚起 App
                const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(final.name)}&query_place_id=${final.lat},${final.lon}`;
                document.getElementById('maps-url').href = mapLink;
                actions.classList.remove('hidden');
                lastResult = { name: final.name, url: mapLink };
            }, 3000);
        }

        function copyToClipboard() {
            const shareText = `今天午餐就吃這個了！\n\n🍴 店家：${lastResult.name}\n📍 導航：${lastResult.url}\n\n#隨便都可以 #午餐盲盒`;
            navigator.clipboard.writeText(shareText).then(() => {
                const btn = document.querySelector('[onclick="copyToClipboard()"]');
                const originalText = btn.innerText;
                btn.innerText = "已複製！";
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }

        function toggleMode() {
            if(isSpinning) return;
            currentMode = currentMode === 'worker' ? 'student' : 'worker';
            localStorage.setItem('userMode', currentMode);
            updateUI();
        }

        function updateUI() {
            const modeTextEl = document.getElementById('mode-text');
            // 切換 body 的 class，讓 CSS 變數跟著切換
            document.body.className = `mode-${currentMode} flex flex-col items-center justify-center p-6`;
            modeTextEl.innerText = currentMode === 'worker' ? '社畜模式' : '可悲學生';
        }
    </script>
</body>
</html>
